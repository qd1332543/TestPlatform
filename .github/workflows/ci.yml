name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "dev/v-peq/**"

jobs:
  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  agent:
    name: Agent smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r agent/requirements.txt

      - name: Compile agent
        run: python -m compileall agent

      - name: Run agent smoke tests
        run: python -m pytest agent/tests -q

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [web, agent]
    steps:
      - run: echo "All checks passed"
